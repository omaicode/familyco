name: Bug Report
description: Report a reproducible problem in the application, workflows, or developer tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce and validate the issue quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to trigger the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share OS, runtime, package manager, browser, or other relevant context.
      placeholder: |
        - OS:
        - Node:
        - pnpm:
        - App target:

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste stack traces, command output, or screenshots if available.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched for existing issues before opening this one.
          required: true
        - label: I can still reproduce this issue on the latest main branch or latest release.
          required: true