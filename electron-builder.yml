appId: com.familyco.app
productName: FamilyCo
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
executableName: "familyco"
directories:
  output: dist/packages
files:
  - from: dist
    to: .
    filter:
      - "**/*"
      - "!packages/*"
  - from: ../../node_modules
    to: node_modules
    filter:
      - "**/*"
      - "!electron*/"
      - "!@electron*/"
      - "!vite*/"
      - "!@vite*/"
      - "!vue*/"
  - from: ../web/dist
    to: web
    filter:
      - "**/*"
  - package.json
extraResources:
  - from: ../db/prisma/migrations
    to: prisma/migrations
    filter:
      - "**/*"
mac:
  icon: ./icons/mac/icon.icns
  category: public.app-category.business
  target:
    - dmg
    - zip
win:
  icon: ./icons/win/icon.ico
  target:
    - nsis
linux:
  icon: ./icons/png
  maintainer: FamilyCo <support@familyco.app>
  target:
    - AppImage