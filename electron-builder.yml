appId: com.familyco.desktop
productName: FamilyCo
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
directories:
  output: dist/desktop
files:
  - from: dist
    to: .
    filter:
      - "**/*"
  - package.json
extraResources:
  - from: ../renderer/dist
    to: renderer
    filter:
      - "**/*"
  - from: ../../prisma/migrations
    to: prisma/migrations
    filter:
      - "**/*"
mac:
  category: public.app-category.business
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  maintainer: FamilyCo <support@familyco.app>
  target:
    - AppImage
