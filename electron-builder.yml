appId: com.familyco.app
productName: FamilyCo
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
executableName: "familyco"
publish:
  provider: github
  owner: omaicode
  repo: familyco
  releaseType: release
directories:
  output: ../../build
files:
  - from: dist
    to: .
    filter:
      - "**/*"
      - "!packages/*"
  - from: ../../node_modules
    to: node_modules
    filter:
      - "**/*"
      - "!.pnpm${/*}"
      - "!.bin${/*}"
      - "!@vite${/*}"
      - "!@vue${/*}"
      - "!@react${/*}"
      - "!@babel${/*}"
      - "!@types${/*}"
      - "!@familyco${/*}"
      - "!@prisma${/*}"
      - "!@turbo${/*}"
      - "!@rolldown${/*}"
      - "!@esbuild${/*}"
      - "!@microsoft${/*}"
      - "!@electric*${/*}"
      - "!vite${/*}"
      - "!vue${/*}"
      - "!react${/*}"
      - "!tailwindcss${/*}"
      - "!chart.js${/*}"
      - "!typescript${/*}"
      - "!lightningcss${/*}"
      - "!effect${/*}"
      - "!7zip-bin${/*}"
      - "!lucide-vue-next${/*}"
      - "!app-builder*${/*}"
      - "!*electron*${/*}"
      - "!**/.bin${/*}"
  - from: ../web/dist
    to: web
    filter:
      - "**/*"
  - package.json
extraResources:
  - from: ../../packages/db/prisma/migrations
    to: prisma/migrations
    filter:
      - "**/*"
mac:
  icon: ./icons/mac/icon.icns
  category: public.app-category.business
  target:
    - dmg
    - zip
win:
  icon: ./icons/win/icon.ico
  target:
    - nsis
linux:
  icon: ./icons/png
  maintainer: FamilyCo <support@familyco.app>
  target:
    - AppImage